<!DOCTYPE html>
<html lang="en" data-default-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — EchoFrame</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%226%22 fill=%22%234F5DFF%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/premium.css">
</head>
<body>

<div class="page-loader" data-page-loader aria-hidden="true">
  <div class="loader-mark">
    <svg viewBox="0 0 44 44">
      <circle class="loader-ring" cx="22" cy="22" r="19"></circle>
      <circle class="loader-arc" cx="22" cy="22" r="19"></circle>
    </svg>
  </div>
</div>
<div class="cursor-glow" data-cursor-glow aria-hidden="true"></div>

<div class="auth-shell">
  <div class="auth-card">
    <a class="brand" href="index.html" aria-label="EchoFrame home">
      <svg class="brand-mark" viewBox="0 0 24 24" fill="none"><path d="M4 4H9M4 4V9M20 4H15M20 4V9M4 20H9M4 20V15M20 20H15M20 20V15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M8 12C9.5 10 14.5 14 16 12" stroke="#4F5DFF" stroke-width="1.6" stroke-linecap="round"/></svg>
      EchoFrame
    </a>

    <div class="card" style="padding: var(--space-4);">
      <h1 style="font-size:1.25rem; text-align:center; margin-bottom: var(--space-3);">Log in to your workspace</h1>

      <button class="btn btn-secondary btn-block social-btn">
        <svg width="16" height="16" viewBox="0 0 16 16"><path fill="#4285F4" d="M15.68 8.18c0-.56-.05-1.1-.14-1.62H8v3.07h4.3a3.68 3.68 0 0 1-1.6 2.42v2h2.6a7.9 7.9 0 0 0 2.38-5.87z"/><path fill="#34A853" d="M8 16c2.16 0 3.97-.72 5.3-1.95l-2.6-2a4.8 4.8 0 0 1-2.7.76 4.9 4.9 0 0 1-4.6-3.4H.7v2.1A8 8 0 0 0 8 16z"/><path fill="#FBBC05" d="M3.4 9.4A4.8 4.8 0 0 1 3.15 8c0-.48.09-.95.25-1.4V4.5H.7A8 8 0 0 0 0 8c0 1.29.31 2.5.7 3.5z"/><path fill="#EA4335" d="M8 3.18c1.18 0 2.23.4 3.06 1.2l2.3-2.3A7.9 7.9 0 0 0 8 0 8 8 0 0 0 .7 4.5l2.7 2.1A4.9 4.9 0 0 1 8 3.18z"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider">or</div>

      <form data-form data-confirm="Welcome back. Redirecting to your dashboard...">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
          <span class="field-error-msg"></span>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <span class="field-error-msg"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p class="text-center text-meta" style="margin-top: var(--space-3);"><a href="#" style="color:var(--color-accent);">Forgot your password?</a></p>
    </div>

    <p class="text-center text-meta" style="margin-top: var(--space-3);">
      Don't have an account? <a href="signup.html" style="color:var(--color-accent); font-weight:500;">Start a free trial</a>
    </p>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/premium.js"></script>
</body>
</html>
